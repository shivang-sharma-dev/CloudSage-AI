name: SonarQube Analysis

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonarqube-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend test coverage for Sonar
        run: |
          python -m pip install --upgrade pip
          pip install -r app/backend/requirements.txt -r app/backend/requirements-dev.txt pytest-cov
          mkdir -p reports
          pytest app/backend/tests --cov=app/backend/app --cov-report=xml:reports/coverage.xml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "app/frontend/package-lock.json"

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # only for self-hosted SonarQube