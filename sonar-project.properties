sonar.projectKey=shivang-sharma-dev_CloudSage-AI
sonar.organization=shivang-sharma-dev

# ── Source paths ──────────────────────────────────────────────
sonar.sources=app/frontend/src,app/backend/app
sonar.exclusions=**/node_modules/**,**/.venv/**,**/dist/**,**/alembic/**,**/__pycache__/**

# ── Test paths ────────────────────────────────────────────────
sonar.tests=app/backend/tests
sonar.test.inclusions=**/test_*.py,**/*.test.js,**/*.spec.js

# ── Coverage reports ──────────────────────────────────────────
# Uncomment once vitest + coverage is configured:
# sonar.javascript.lcov.reportPaths=app/frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=reports/coverage.xml

# ── Language settings ─────────────────────────────────────────
sonar.python.version=3.9

# ── Quality Gate ──────────────────────────────────────────────
# Do not block CI on quality gate result (exit code 3)
# Remove this once the project clears the default gate
sonar.qualitygate.wait=false
